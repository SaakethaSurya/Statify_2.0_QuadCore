version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: statify_api_service
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      - ENV=production
    depends_on:
      - vector-db
    networks:
      - statify_network

  vector-db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: statify_vectordb_service
    ports:
      - "8001:8001"
    command: python mcp_server.py
    volumes:
      - vector_data:/app/data
    networks:
      - statify_network

networks:
  statify_network:
    driver: bridge

volumes:
  vector_data: